services:
  # Next.js App
  valsys:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: valsys_app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - valsys_net

  # Base de Datos Relacional
  postgres:
    image: postgres:15-alpine
    container_name: valvulas_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: sistema_valvulas
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sistema_valvulas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - valsys_net

  # Buscador Ultra-Rápido
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: valvulas_search
    restart: always
    environment:
      - MEILI_MASTER_KEY=masterKey123!
      - MEILI_ENV=development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    networks:
      - valsys_net

  # Almacenamiento de Fotos y PDFs
  minio:
    image: minio/minio:latest
    container_name: valvulas_storage
    restart: always
    environment:
      MINIO_ROOT_USER: admin_minio
      MINIO_ROOT_PASSWORD: password_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - valsys_net

  # Túnel Cloudflare permanente — HTTPS con dominio gratuito fijo
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: valvulas_tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      - valsys
    networks:
      - valsys_net

volumes:
  pg_data:
  meili_data:
  minio_data:

networks:
  valsys_net:
    driver: bridge
